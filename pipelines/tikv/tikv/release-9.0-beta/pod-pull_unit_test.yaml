apiVersion: v1
kind: Pod
spec:
  containers:
    - name: runner
      image: "ghcr.io/pingcap-qe/cd/builders/tikv:v2025.8.17-13-ga5750d9"
      imagePullPolicy: Always
      tty: true
      command:
        - "/bin/sh"
        - "-c"
      args:
        - "cat"
      resources:
        requests:
          memory: 16Gi
          cpu: "8"
      securityContext:
        privileged: true
      volumeMounts:
      - mountPath: "/home/jenkins/agent/memvolume"
        name: "volume-memory"
        readOnly: false
      - mountPath: "/tmp"
        name: "volume-tmp"
        readOnly: false
    - name: net-tool
      image: wbitt/network-multitool
      tty: true
      resources:
        limits:
          memory: 128Mi
          cpu: 100m
  volumes:
  - emptyDir:
      medium: ""
    name: "volume-tmp"
  - emptyDir:
      medium: Memory
    name: "volume-memory"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
              - key: ci-nvme-high-performance
                operator: In
                values:
                  - "true"
