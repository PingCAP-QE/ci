apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: runner
      image: "ghcr.io/pingcap-qe/ci/jenkins/tikv:v2026.3.22-4-gd9d1135"
      imagePullPolicy: Always
      tty: true
      command:
        - "/bin/sh"
        - "-c"
      args:
        - "cat"
      resources:
        requests:
          memory: 24Gi
          cpu: "6"
        # Keep limits unset: nextest uses tmpfs-backed scratch space and can spike.
      securityContext:
        privileged: true
      volumeMounts:
      - mountPath: "/home/jenkins/agent/memvolume"
        name: "volume-memory"
        readOnly: false
      - mountPath: "/tmp"
        name: "volume-tmp"
        readOnly: false
  volumes:
  - emptyDir:
      medium: ""
    name: "volume-tmp"
  - emptyDir:
      medium: Memory
    name: "volume-memory"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
