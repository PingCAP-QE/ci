apiVersion: v1
kind: Pod
spec:
  containers:
    - name: runner
      image: "ghcr.io/pingcap-qe/cd/builders/tikv:v2025.12.14-1-g33e22ac-centos7-devtoolset8"
      tty: true
      command:
        - "/bin/sh"
        - "-c"
      args:
        - "cat"
      resources:
        requests:
          memory: 32Gi
          cpu: "6"
      securityContext:
        privileged: true
      volumeMounts:
      - mountPath: "/home/jenkins/agent/memvolume"
        name: "volume-memory"
        readOnly: false
      - mountPath: "/tmp"
        name: "volume-tmp"
        readOnly: false
  volumes:
  - emptyDir:
      medium: ""
    name: "volume-tmp"
  - emptyDir:
      medium: Memory
    name: "volume-memory"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
