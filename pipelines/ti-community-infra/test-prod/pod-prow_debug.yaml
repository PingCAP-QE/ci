apiVersion: v1
kind: Pod
spec:
  containers:
    - name: jnlp
      image: "jenkins/inbound-agent:3345.v03dee9b_f88fc-1"
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 100m
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
