apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: golang
      image: "ghcr.io/pingcap-qe/ci/jenkins:v2024.10.8-119-g4e56df7-go1.21"
      tty: true
      resources:
        requests:
          memory: 24Gi
          cpu: 6000m
        limits:
          memory: 32Gi
          cpu: 8000m
    - name: pulsar
      image: "apachepulsar/pulsar:2.10.4"
      imagePullPolicy: IfNotPresent
      tty: true
      resources:
        requests:
          memory: 4Gi
          cpu: "4"
        limits:
          memory: 6Gi
          cpu: "6"
      command: ["bin/pulsar", "standalone"]
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
