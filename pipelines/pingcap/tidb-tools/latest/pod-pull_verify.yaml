apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: runner
      image: ghcr.io/pingcap-qe/ci/jenkins:v2025.12.7-3-g1c0b8cf-go1.23
      tty: true
      env:
        - name: GOPATH
          value: /go
      resources:
        limits:
          memory: 8Gi
          cpu: "4"
    - name: mysql
      image: docker.io/library/mysql:5.7
      tty: true
      args: ["--server-id=1", "--log-bin", "--binlog-format=ROW"]
      env:
        - name: MYSQL_ALLOW_EMPTY_PASSWORD
          value: "1"
      resources:
        limits:
          memory: 2Gi
          cpu: "1"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
