apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000
  initContainers:
    - name: download-sqllogic
      image: "ghcr.io/pingcap-qe/cd/utils/release:v2025.10.12-7-gfdd779c"
      command:
        - /bin/sh
        - -c
        - |
          cd /git && \
          oras pull us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/case-data/sqllogic:v20241212 && \
          tar xzf sqllogictest_v20241212.tar.gz && \
          rm sqllogictest_v20241212.tar.gz
      volumeMounts:
        - name: test-data
          mountPath: /git
  containers:
    - name: golang
      image: "ghcr.io/pingcap-qe/ci/jenkins:v2026.3.29-14-g90ae7ef-go1.25"
      tty: true
      resources:
        requests:
          memory: 12Gi
          cpu: "3"
        limits:
          memory: 24Gi
          cpu: "6"
      volumeMounts:
        - name: test-data
          mountPath: /git
    - name: utils
      image: "ghcr.io/pingcap-qe/cd/utils/release:v2025.10.12-7-gfdd779c"
      tty: true
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          cpu: "1"
          memory: 4Gi
      volumeMounts:
        - name: test-data
          mountPath: /git
  volumes:
    - name: test-data
      emptyDir: {}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
