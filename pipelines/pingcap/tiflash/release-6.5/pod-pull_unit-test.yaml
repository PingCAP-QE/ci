apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: runner
      image: "ghcr.io/pingcap-qe/cd/builders/tiflash:v20231106"
      tty: true
      resources:
        requests:
          memory: "24Gi"
          cpu: "6"
          ephemeral-storage: 20Gi
      volumeMounts:
        - mountPath: "/tmp"
          name: "tmp"
          readOnly: false
        - mountPath: "/tmp-memfs"
          name: "tmp-memfs"
          readOnly: false
  volumes:
    - name: "tmp"
      emptyDir: {}
    - name: "tmp-memfs"
      emptyDir:
        medium: Memory
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
