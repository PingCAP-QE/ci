apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: golang
      image: "us-docker.pkg.dev/pingcap-testing-account/ghcr-remote/pingcap-qe/ci/jenkins:v2026.3.29-14-g90ae7ef-go1.25"
      tty: true
      env:
        - name: GOPROXY
          value: "https://us-go.pkg.dev/pingcap-testing-account/go-proxy-remote|https://proxy.golang.org,direct"
      resources:
        requests:
          memory: 12Gi
          cpu: "4"
        limits:
          memory: 16Gi
          cpu: "6"
      volumeMounts:
        - mountPath: /tmp
          name: volume-0
    - image: docker.io/wurstmeister/zookeeper
      imagePullPolicy: IfNotPresent
      name: zookeeper
      resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
      tty: true
      volumeMounts:
        - mountPath: /tmp
          name: volume-0
    - env:
        - name: KAFKA_MESSAGE_MAX_BYTES
          value: "1073741824"
        - name: KAFKA_REPLICA_FETCH_MAX_BYTES
          value: "1073741824"
        - name: KAFKA_ADVERTISED_PORT
          value: "9092"
        - name: KAFKA_ADVERTISED_HOST_NAME
          value: "127.0.0.1"
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: ZK
          value: "zk"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "127.0.0.1:2181"
      image: docker.io/wurstmeister/kafka:2.12-2.4.1
      imagePullPolicy: IfNotPresent
      name: kafka
      resources:
        requests:
          cpu: 4000m
          memory: 6Gi
        limits:
          cpu: 4000m
          memory: 6Gi
      tty: true
      volumeMounts:
        - mountPath: /tmp
          name: volume-0
    - name: utils
      image: us-docker.pkg.dev/pingcap-testing-account/ghcr-remote/pingcap-qe/cd/utils/release:v2025.10.12-7-gfdd779c
      tty: true
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          cpu: "1"
          memory: 4Gi

  volumes:
    - emptyDir:
        medium: Memory
      name: volume-0
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
