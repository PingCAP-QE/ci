# yaml-language-server: $schema=https://github.com/redhat-developer/vscode-tekton/raw/refs/heads/main/scheme/tekton.dev/v1_Task.json
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pingcap-notify-to-update-ops-tidbx
  labels:
    app.kubernetes.io/version: "0.1.0"
  annotations:
    tekton.dev/pipelines.minVersion: "1.0.0"
    tekton.dev/categories: delivery
    tekton.dev/tags: ops,cloud,tidbx
    tekton.dev/displayName: "Notify to update ops config for TiDB-X"
    tekton.dev/platforms: "linux/amd64,linux/arm64"
spec:
  params:
    - name: images
      type: string
      description: images list
      default: "[]"
    - name: target_images
      type: string
      description: delivered target images list
      default: "[]"
    - name: stage
      type: string
      description: stage name
    - name: publisher-url
      type: string
      description: publisher url
      default: "http://publisher.publisher.svc"
  workspaces:
    - name: notify-config
      description: |
        Configuration for GitHub authentication and issue URLs.
        Include files:
        - <stage>_lark_webhook: lark bot webhook url
      readOnly: true
    - name: ops-config
      description: |
        Configuration to call Ops platform APIs.
        Include files:
        - <stage>.json
      readOnly: true
  stepTemplate:
    image: ghcr.io/pingcap-qe/cd/utils/release:v2025.10.26-5-ge8130cb
  steps:
    - name: update-ops-config
      when:
        - input: "$(params.stage)"
          operator: in
          values: ["prod", "dev"]
      args:
        - "$(params.stage)"
        - "$(params.images)"
        - "$(params.publisher-url)"
        - "/workspace/ops-tickets.txt"
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        function update_ops_config_for_image() {
          local stage="$1"
          local image="$2"
          local publisher_url="$3"
          local save_file="$4"

          local body_file=$(mktemp)

          # Create JSON payload
          jq -n --arg stage "$stage" --arg image "$image" '{ stage: $stage, image: $image }' > "$body_file"

          # Call API
          local api_url="$publisher_url/tidbcloud/devops/cloudconfig/versions/component"
          curl --fail -X POST -H "Content-Type: application/json" -d "@$body_file" "$api_url" | \
            jq -r '.tickets[] | "\(.component)@\(.component_version): \(.url)"' | tee -a "$save_file"

          # Clean up
          rm -f "$body_file"
        }

        function main() {
          stage="$1"
          images="$(echo "$2" | jq -r '.[] // empty' 2>/dev/null || echo "")"
          publisher_url="$3"
          save_file="$4"
          for image in $images; do
            update_ops_config_for_image "$stage" "$image" "$publisher_url" "$save_file"
          done

          echo "🎉 Done!"
        }

        main "$@"

    - name: notify-in-lark-channel
      args:
        - "$(params.stage)"
        - "$(params.images)"
        - "$(params.target_images)"
        - /workspace/ops-tickets.txt
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        function send_lark_notification() {
          local message="$1"
          local lark_webhook_url="$2"
          local body_file=$(mktemp)

          # Create JSON payload
          echo "message: $message"
          if ! jq -n --arg text "$message" '{ msg_type: "text", content: { text: $text } }' > "$body_file" 2>/dev/null; then
            >&2 echo "Error: failed to create JSON payload for Lark notification"
            rm -f "$body_file"
            return 1
          fi

          # Send notification
          curl --fail -X POST -H "Content-Type: application/json" -d "@$body_file" "$lark_webhook_url"

          # Clean up
          rm -f "$body_file"
        }

        function generate_image_delivery_message() {
          local stage="$1"
          local source_images="$2"
          local target_images="$3"

          local title="The Images are delivered to cloud registries of ${stage} env."
          local source_image_lines="$(echo "$source_images" | jq -r '.[] // empty' 2>/dev/null || echo "$source_images")"
          local target_image_lines="$(echo "$target_images" | jq -r '.[] // empty' 2>/dev/null || echo "$target_images")"
          printf "%s\nSources:\n%s\nTargets:\n%s" "$title" "$source_image_lines" "$target_image_lines"
        }

        function generate_ops_tickets_message() {
          local stage="$1"
          local tickets_file="$2"

          printf "The Ops tickets are created for %s env:\n%s" "$stage" "$(cat "$tickets_file")"
        }

        # Main execution
        lark_webhook_url="$(cat $(workspaces.notify-config.path)/${1}_lark_webhook)"

        # Send image delivery notification
        image_delivery_message="$(generate_image_delivery_message "$1" "$2" "$3")"
        send_lark_notification "$image_delivery_message" "$lark_webhook_url"

        # Send ops tickets notification if tickets file exists
        if [ -f "$4" ]; then
          ops_tickets_message="$(generate_ops_tickets_message "$1" "$4")"
          send_lark_notification "$ops_tickets_message" "$lark_webhook_url"
        fi
