# yaml-language-server: $schema=https://github.com/redhat-developer/vscode-tekton/raw/refs/heads/main/scheme/tekton.dev/v1_Task.json
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-delivery-images
spec:
  description: |
    Wait for images delivery to complete.
    This task should be run with service account with `pull-images` permission on the OCI registry.
  workspaces:
    - name: delivery-config
      optional: true
      description: >
        ConfigMap volume containing delivery.yaml and get-delivery-target-images.ts.
        When provided, files are read from this workspace instead of downloading from GitHub.
  params:
    - name: version
      type: string
      description: the version to wait for delivery.
    - name: oci-registry
      default: us-docker.pkg.dev/pingcap-testing-account/hub
      description: The OCI registry stored the origin tarball files.
    - name: delivery-config
      default: "https://github.com/PingCAP-QE/artifacts/raw/main/packages/delivery.yaml"
      description: The delivery config yaml file, it contains delivery rules.
  steps:
    - name: compute
      image: docker.io/denoland/deno:alpine-2.1.4
      script: |
        config_dir="$(workspaces.delivery-config.path)"
        if [ -n "$config_dir" ] && [ -f "$config_dir/delivery.yaml" ]; then
          echo "Using delivery.yaml from ConfigMap workspace"
          config_path="$config_dir/delivery.yaml"
        else
          echo "ConfigMap not available, falling back to URL"
          config_path="$(params.delivery-config)"
        fi
        deno run --allow-all https://github.com/PingCAP-QE/artifacts/raw/main/packages/scripts/get-delivery-target-images.ts \
          --version="$(params.version)" \
          --registry="$(params.oci-registry)" \
          --config="$config_path" \
          --save_to=/workspace/target-images.yaml
    - name: wait
      image: ghcr.io/pingcap-qe/cd/utils/release:v2025.10.12-7-gfdd779c
      script: |
        cat /workspace/target-images.yaml

        while true; do
          # loop with yq for /workspace/target-images.yaml:
          check_success=true
          for image in $(yq -r '.[]' /workspace/target-images.yaml); do
            echo -en "Checking $image...\t"
            if oras manifest fetch $image > /dev/null; then
              echo "🏅 delivery succeeded!"
            else
              echo "🤷 not found."
              check_success=false
            fi
          done

          if $check_success; then
            echo "🏅🏅🏅 All images delivery succeeded!"
            break
          else
            echo "❌❌❌ Some images delivery failed, retrying in 1 minute..."
            sleep 60
          fi
        done
