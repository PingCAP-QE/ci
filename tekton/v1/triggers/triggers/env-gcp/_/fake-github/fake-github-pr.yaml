apiVersion: triggers.tekton.dev/v1beta1
kind: Trigger
metadata:
  name: fake-github-pr
  labels:
    type: fake-github-pr
spec:
  interceptors:
    - name: filter on repo
      ref: { name: cel }
      params:
        - name: filter
          value: >-
            (header.canonical('ce-paramGithubRepo') != '' ||
            body.repository.full_name in [
              'pingcap-inc/tici',
              'pingcap/ng-monitoring',
              'pingcap/ticdc',
              'pingcap/tidb',
              'pingcap/tidb-binlog',
              'pingcap/tidb-dashboard',
              'pingcap/tidb-operator',
              'pingcap/tidb-tools',
              'pingcap/tiflash',
              'pingcap/tiflow',
              'pingcap/tiproxy',
              'tidbcloud/cloud-storage-engine',
              'tidbcloud/tiflash-cse',
              'tikv/pd',
              'tikv/tikv'
            ])
            &&
            ! (header.canonical('ce-paramPlatform') in [
              'linux/amd64',
              'linux/arm64',
              'darwin/amd64',
              'darwin/arm64'
            ])
        - name: overlays
          value:
            - key: resource-config
              expression: >-
                {
                  'pingcap-inc/tici': {
                    'timeout': '2h',
                    'sourceWsSize': '50Gi',
                    'cpu': '8',
                    'memory': '32Gi'
                  },
                  'pingcap/ng-monitoring': {
                    'timeout': '30m',
                    'sourceWsSize': '20Gi',
                    'cpu': '2',
                    'memory': '4Gi'
                  },
                  'pingcap/ticdc': {
                    'timeout': '20m',
                    'sourceWsSize': '50Gi',
                    'cpu': '4',
                    'memory': '16Gi'
                  },
                  'pingcap/tidb': {
                    'timeout': '40m',
                    'sourceWsSize': '50Gi',
                    'cpu': '6',
                    'memory': '24Gi'
                  },
                  'pingcap/tidb-binlog': {
                    'timeout': '2h',
                    'sourceWsSize': '100Gi',
                    'cpu': '8',
                    'memory': '32Gi'
                  },
                  'pingcap/tidb-dashboard': {
                    'timeout': '40m',
                    'sourceWsSize': '20Gi',
                    'cpu': '2',
                    'memory': '4Gi'
                  },
                  'pingcap/tidb-operator': {
                    'timeout': '30m',
                    'sourceWsSize': '10Gi',
                    'cpu': '2',
                    'memory': '8Gi'
                  },
                  'pingcap/tidb-tools': {
                    'timeout': '1h',
                    'sourceWsSize': '10Gi',
                    'cpu': '4',
                    'memory': '16Gi'
                  },
                  'pingcap/tiflash': {
                    'timeout': '2h',
                    'sourceWsSize': '100Gi',
                    'cpu': '12',
                    'memory': '48Gi'
                  },
                  'pingcap/tiflow': {
                    'timeout': '40m',
                    'sourceWsSize': '50Gi',
                    'cpu': '6',
                    'memory': '24Gi'
                  },
                  'pingcap/tiproxy': {
                    'timeout': '30m',
                    'sourceWsSize': '20Gi',
                    'cpu': '3',
                    'memory': '12Gi'
                  },
                  'tidbcloud/cloud-storage-engine': {
                    'timeout': '2h30m',
                    'sourceWsSize': '100Gi',
                    'cpu': '12',
                    'memory': '48Gi'
                  },
                  'tidbcloud/tiflash-cse': {
                    'timeout': '2h',
                    'sourceWsSize': '100Gi',
                    'cpu': '12',
                    'memory': '48Gi'
                  },
                  'tikv/pd': {
                    'timeout': '40m',
                    'sourceWsSize': '50Gi',
                    'cpu': '6',
                    'memory': '24Gi'
                  },
                  'tikv/tikv': {
                    'timeout': '2h30m',
                    'sourceWsSize': '100Gi',
                    'cpu': '12',
                    'memory': '56Gi'
                  }
                }[body.repository.full_name]
            - key: custom-params
              expression: >-
                {
                  'builder-image': header.canonical('ce-paramBuilderImage'),
                  'profile': header.canonical('ce-paramProfile') == '' ? 'release' : (header.canonical('ce-paramProfile') == 'community' ? 'release' : header.canonical('ce-paramProfile')),
                }
            - key: component
              expression: >-
                body.repository.full_name.startsWith('tidbcloud/') ? {
                  'tidbcloud/tiflash-cse': 'tiflash',
                  'tidbcloud/cloud-storage-engine': 'tikv',
                }[body.repository.full_name]
                : body.repository.name
            - key: registry
              expression: >-
                header.canonical('ce-type').startsWith('net.pingcap.tibuild.hotfix.') ?
                'us-docker.pkg.dev/pingcap-testing-account/hotfix' :
                'us-docker.pkg.dev/pingcap-testing-account/dev'

  bindings:
    - ref: github-pr
    - ref: ksy-dev-build-params

  template:
    ref: build-component-all-platforms
