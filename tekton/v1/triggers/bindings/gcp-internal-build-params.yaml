apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: gcp-internal-build-params # only use in GCP clusters for internal builds
spec:
  params:
    - name: registry
      value: us-docker.pkg.dev/pingcap-testing-account/internal
    - name: publisher-auth-secret-name
      value: publisher-auth
    - name: publisher-url
      value: "http://publisher.publisher.svc" # in cluster
