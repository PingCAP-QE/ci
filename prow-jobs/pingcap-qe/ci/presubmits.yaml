global_definitions:
  labels: &labels
    owner: "wei_zheng"
    team: "qe"
    env: "cicd"
    component: "jenkins"

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  PingCAP-QE/ci:
    - name: pull-verify-pr-content-policy
      labels: *labels
      decorate: true
      always_run: true
      max_concurrency: 1
      branches:
        - ^main$
      spec:
        containers:
          - name: main
            image: ghcr.io/pingcap-qe/cd/utils/release:v2026.3.29-14-g90ae7ef
            command: [bash, -ceo, pipefail]
            args:
              - |
                .ci/check-pr-content-policy.sh --base-sha "${PULL_BASE_SHA:?missing PULL_BASE_SHA}"
            resources:
              limits:
                memory: 128Mi
                cpu: 200m
    - name: pull-replay-jenkins-pipelines
      labels: *labels
      decorate: true
      always_run: false
      optional: true
      max_concurrency: 1
      trigger: "(?m)^/test (?:.*? )?pull-replay-jenkins-pipelines(?: .*?)?$"
      rerun_command: "/test pull-replay-jenkins-pipelines"
      run_if_changed: "^pipelines/.*\\.groovy$"
      branches:
        - ^main$
      spec:
        containers:
          - name: main
            image: wbitt/network-multitool
            env:
              - name: JENKINS_URL
                value: https://prow.tidb.net/jenkins
              - name: JENKINS_USER
                valueFrom:
                  secretKeyRef:
                    name: ci-job-params-mono
                    key: ci-job-jenkins-user
              - name: JENKINS_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: ci-job-params-mono
                    key: ci-job-jenkins-token
            command: [bash, -ceo, pipefail]
            args:
              - |
                apk add --no-cache git jq ripgrep
                .ci/replay-jenkins-build.sh \
                  --auto-changed \
                  --base-sha "${PULL_BASE_SHA:-}" \
                  --head-sha "${PULL_PULL_SHA:-}" \
                  --selector lastSuccessfulBuild \
                  --wait \
                  --max-replays 20 \
                  --verbose \
                  --timeout 7200 \
                  --poll-interval 20
            resources:
              limits:
                memory: 256Mi
                cpu: 200m
    - name: pull-verify-secret-scan
      labels: *labels
      decorate: true
      run_if_changed: "^(pipelines|jobs|libraries|prow-jobs)/.*\\.(groovy|yaml|yml)$|^\\.ci/(verify-secret-scan|verify-jenkins-credential-policy|security-policy-allowlist)\\.(sh|txt)$"
      max_concurrency: 1
      timeout: 15m
      branches:
        - ^main$
      spec:
        containers:
          - name: main
            image: zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
            command: [sh, -ce]
            args:
              - |
                apk add --no-cache bash git ripgrep
                bash .ci/verify-jenkins-credential-policy.sh
                sh .ci/verify-secret-scan.sh
            resources:
              limits:
                memory: 256Mi
                cpu: 200m
    - name: pull-test-security-policy-scripts
      labels: *labels
      decorate: true
      max_concurrency: 1
      run_if_changed: '^\.ci/(verify-jenkins-credential-policy|test-verify-jenkins-credential-policy)\.sh$|^\.ci/security-policy-allowlist\.txt$'
      timeout: 10m
      branches:
        - ^main$
      spec:
        containers:
          - name: main
            image: alpine:3.23
            command: [sh, -ce]
            args:
              - |
                apk add --no-cache bash git ripgrep
                bash .ci/test-verify-jenkins-credential-policy.sh
            resources:
              limits:
                memory: 256Mi
                cpu: 200m

    - name: pull-verify-jenkins-pipelines
      labels: *labels
      decorate: true
      max_concurrency: 1
      run_if_changed: pipelines/.*\.groovy
      branches:
        - main
      spec:
        containers:
          - name: main
            image: wbitt/network-multitool
            env:
              - name: JENKINS_URL
                value: https://prow.tidb.net/jenkins
            command: [bash, -ceo, pipefail]
            args:
              - |
                apk add parallel
                .ci/verify-jenkins-pipelines.sh
            resources:
              limits:
                memory: 128Mi
                cpu: 200m
    - name: pull-verify-k8s-pod-yaml
      labels: *labels
      decorate: true
      max_concurrency: 1
      run_if_changed: "^pipelines/.*\\.(yaml|yml)$"
      branches:
        - ^main$
      spec:
        containers:
          - name: main
            image: alpine:3.23
            command: [sh, -ce]
            args:
              - |
                apk add --no-cache kubectl yq-go
                sh .ci/verify-k8s-pod-yaml.sh
            resources:
              limits:
                memory: 128Mi
                cpu: 200m
    - name: pull-verify-prow-jobs
      labels: *labels
      decorate: true
      extra_refs:
        - org: ti-community-infra
          repo: configs
          base_ref: main
          repo_link: https://github.com/ti-community-infra/configs
        - org: PingCAP-QE
          repo: ee-ops
          base_ref: main
          repo_link: https://github.com/PingCAP-QE/ee-ops
      max_concurrency: 1
      run_if_changed: "^prow-jobs/.*\\.(yaml|yml)"
      branches:
        - ^main$
      spec:
        containers:
          - command: [sh, -c]
            args:
              - |
                mkdir -p flatten-prow-jobs;
                for f in $(find prow-jobs -name "*.yaml" -type f | sed 's|prow-jobs/||' | grep -v kustomization.yaml | sort); do
                  flatten_f=$(echo $f | sed 's|/|-|g');
                  cp -v prow-jobs/$f flatten-prow-jobs/$flatten_f;
                done;

                /ko-app/checkconfig \
                --plugin-config=../../ti-community-infra/configs/prow/config/plugins.yaml \
                --config-path=../../ti-community-infra/configs/prow/config/config.yaml \
                --job-config-path=flatten-prow-jobs/
            image: ghcr.io/ti-community-infra/prow/checkconfig:v20250905-a0cfed255
            name: checkconfig
            resources: {}
          - name: verify-gitops
            image: ghcr.io/fluxcd/flux-cli:v2.8.6
            securityContext:
              runAsUser: 0 # the default user or the image is not root.
            command: [flux, -n, apps]
            args:
              - build
              - kustomization
              - prow-jobs
              - --path=prow-jobs
              - --kustomization-file=../ee-ops/apps/gcp/prow/pre/prow-jobs.yaml
              - --dry-run
            resources:
              limits:
                memory: 256Mi
                cpu: 200m
          - name: verify-kustomization
            image: mikefarah/yq:4.44.1
            securityContext:
              runAsUser: 0 # the default user or the image is not root.
            command: [sh, -c]
            args:
              - |
                apk add bash
                apk add git
                .ci/update-prow-job-kustomization.sh
            resources:
              limits:
                memory: 256Mi
                cpu: 200m
