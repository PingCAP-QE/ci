global_definitions:
  jenkins_job: &jenkins_job
    agent: jenkins
    labels:
      master: "1"
    decorate: false # need add this.

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Postsubmit
postsubmits:
  PingCAP-QE/ci:
    - <<: *jenkins_job
      name: seed
      run_if_changed: "^jobs/.*\\.groovy"
      context: seed
      max_concurrency: 1
      branches:
        - ^main$
