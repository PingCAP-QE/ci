# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
global_definitions:
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  branches: &branches
    - ^release-9\.0-beta\.\d+$
    - ^release-9\.0-beta\.\d+-\d{8}-v9\.0\.0-beta\.\d+(-\d+)?$

presubmits:
  tikv/tikv:
    - name: tikv/tikv/release-9.0-beta/pull_unit_test
      agent: jenkins
      labels:
        master: "0"
      decorate: false # need add this.
      skip_if_only_changed: *skip_if_only_changed
      context: pull-unit-test
      trigger: "(?m)^/test (?:.*? )?pull-unit-test(?: .*?)?$"
      rerun_command: "/test pull-unit-test"
      branches: *branches

    - name: tikv/tikv/release-9.0-beta/pull-clippy-linux-arm64
      agent: kubernetes
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      context: release-9.0-beta/pull-clippy-linux-arm64
      branches: *branches
      spec:
        containers:
          - name: build
            image: ghcr.io/pingcap-qe/cd/builders/tikv:v2026.3.22-3-g892e449
            command: [bash, -ce]
            args:
              - |
                if [ -f /opt/rh/devtoolset-8/enable ]; then
                  source /opt/rh/devtoolset-8/enable
                fi
                make clippy
                ENABLE_FEATURES="test-engines-panic nortcheck" NO_DEFAULT_TEST_ENGINES=1 make clippy
            resources:
              requests:
                memory: 8Gi
                cpu: "4"
              limits:
                memory: 16Gi
                cpu: "8"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - arm64
