global_definitions:
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  affinity: &affinity
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  tikv/client-go:
    - name: pull-integration-test-nextgen
      agent: kubernetes
      branches:
        - ^master$
        - ^feature/.*$
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      optional: true
      timeout: 30m
      spec:
        affinity: *affinity
        serviceAccountName: tidbx-puller
        volumes: &volumes
          - name: tikv-data
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 100Gi
                  storageClassName: hyperdisk-rwo
          - name: minio-data
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
                  storageClassName: hyperdisk-rwo
        initContainers:
          - &sidecar-minio
            name: sidecar-minio
            image: minio/minio:RELEASE.2025-07-23T15-54-02Z
            restartPolicy: Always
            command:
              - minio
              - server
              - /data
            env:
              - name: MINIO_ROOT_USER
                value: minioadmin
              - name: MINIO_ROOT_PASSWORD
                value: minioadmin
            volumeMounts:
              - name: minio-data
                mountPath: /data
            resources:
              limits:
                cpu: "1"
                memory: 2Gi
          - &sidecar-pd
            name: sidecar-pd
            image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/pd/image:master-nextgen
            restartPolicy: Always
            env:
              - name: CONFIG_PATH
                value: /home/prow/go/src/github.com/tikv/client-go/integration_tests/pd_next_gen.toml
            args:
              - --config
              - "$(CONFIG_PATH)"
            resources:
              limits:
                cpu: "1"
                memory: 2Gi
            volumeMounts:
              - mountPath: /home/prow/go
                name: code # from the default prow job source volume
          - &sidecar-tikv
            name: sidecar-tikv
            image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/tikv/image:cloud-engine-nextgen
            restartPolicy: Always
            env:
              - name: PD_ENDPOINT
                value: 127.0.0.1:2379
              - name: LISTEN_ADDRESSES
                value: 127.0.0.1:20160
              - name: CONFIG_PATH
                value: /home/prow/go/src/github.com/tikv/client-go/integration_tests/tikv_next_gen.toml
            command: [bash, -c]
            args:
              - |
                set -euo pipefail
                # Wait for PD before starting TiKV
                for i in $(seq 1 30); do
                  if curl -fsS --max-time 2 "http://${PD_ENDPOINT}/pd/api/v1/health" >/dev/null 2>&1; then
                    echo "PD is ready, starting TiKV"
                    break
                  fi
                  echo "Waiting for PD... (attempt $i)"
                  sleep 2
                done

                exec /tikv-server \
                  -C "${CONFIG_PATH}" \
                  --pd-endpoints="${PD_ENDPOINT}" \
                  --addr="${LISTEN_ADDRESSES}" \
                  --data-dir=/tikv-data
            volumeMounts:
              - mountPath: /tikv-data
                name: tikv-data
              - mountPath: /home/prow/go
                name: code # from the default prow job source volume
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
        containers: &containers
          - name: test
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-27-g440b0c8-go1.25
            command: [bash, -ce]
            env:
              - name: GOTOOLCHAIN
                value: local
            args:
              - |
                #!/usr/bin/env bash
                set -euo pipefail

                wait_for_http() {
                  local url=$1
                  local name=$2
                  for i in $(seq 1 30); do
                    if curl -fsS --max-time 2 "${url}" >/dev/null; then
                      echo "${name} is ready"
                      return
                    fi
                    sleep 1
                  done
                  echo "${name} did not become ready" >&2
                  return 1
                }

                wait_for_http http://127.0.0.1:9000/minio/health/ready MinIO
                wait_for_http http://127.0.0.1:2379/pd/api/v1/health PD
                wait_for_http http://127.0.0.1:20160/status TiKV

                # 👉 Run the integration tests
                cd integration_tests
                go version
                go run gotest.tools/gotestsum@v1.13.0 --format short-verbose -- -tags=nextgen --with-tikv --keyspace-name='keyspace1' 2>&1 | tee /logs/test.log
            resources:
              limits:
                cpu: "2"
                memory: 4Gi

    - name: pull-integration-test-release-nextgen
      agent: kubernetes
      branches:
        - ^release-nextgen-202603$
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      optional: true
      timeout: 30m
      spec:
        affinity: *affinity
        serviceAccountName: tidbx-puller
        volumes: *volumes
        initContainers:
          - *sidecar-minio
          - <<: [*sidecar-pd]
            image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/pd/image:release-nextgen-202603
          - <<: [*sidecar-tikv]
            image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/tikv/image:release-nextgen-202603
        containers: *containers
