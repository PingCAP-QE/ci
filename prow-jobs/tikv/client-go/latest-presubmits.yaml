global_definitions:
  brancher: &brancher
    branches:
      - ^master$
      - ^release-nextgen-[0-9]+$
      - ^feature/.*$
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  affinity: &affinity
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  tikv/client-go:
    - <<: [*brancher]
      name: pull-integration-test-nextgen
      agent: kubernetes
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      optional: true
      timeout: 45m
      spec:
        affinity: *affinity
        serviceAccountName: tidbx-puller
        volumes:
          - name: lifecycle
            emptyDir: {}
          - name: tikv-data
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
                  storageClassName: hyperdisk-rwo
          - name: minio-data
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
                  storageClassName: hyperdisk-rwo
        containers:
          - name: sidecar-minio
            image: minio/minio:RELEASE.2025-07-23T15-54-02Z
            command: [bash, -c]
            args:
              - |
                set -euo pipefail
                minio server /data &
                MINIO_PID=$!
                # Wait for test container to finish, then exit
                while [ ! -f /lifecycle/done ]; do sleep 2; done
                kill $MINIO_PID 2>/dev/null || true
                exit 0
            env:
              - name: MINIO_ROOT_USER
                value: access_key
              - name: MINIO_ROOT_PASSWORD
                value: secret_key
            volumeMounts:
              - name: minio-data
                mountPath: /data
              - name: lifecycle
                mountPath: /lifecycle
            resources:
              limits:
                cpu: "1"
                memory: 2Gi
          - name: sidecar-pd
            image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/pd/image:master-nextgen
            command: [bash, -c]
            args:
              - |
                set -euo pipefail
                export CONFIG_PATH="/home/prow/go/src/github.com/tikv/client-go/integration_tests/pd_next_gen.toml"
                /pd-server --config "${CONFIG_PATH}" &
                PD_PID=$!
                while [ ! -f /lifecycle/done ]; do sleep 2; done
                kill $PD_PID 2>/dev/null || true
                exit 0
            volumeMounts:
              - name: lifecycle
                mountPath: /lifecycle
            resources:
              limits:
                cpu: "1"
                memory: 2Gi
          - name: sidecar-tikv
            image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/tikv/image:cloud-engine-nextgen
            env:
              - name: PD_ENDPOINT
                value: 127.0.0.1:2379
              - name: LISTEN_ADDRESSES
                value: 127.0.0.1:20160
              - name: CONFIG_PATH
                value: /home/prow/go/src/github.com/tikv/client-go/integration_tests/tikv_next_gen.toml
            command: [bash, -c]
            args:
              - |
                set -euo pipefail
                # Wait for PD before starting TiKV
                for i in $(seq 1 30); do
                  if curl -fsS --max-time 2 "http://${PD_ENDPOINT}/pd/api/v1/health" >/dev/null 2>&1; then
                    echo "PD is ready, starting TiKV"
                    break
                  fi
                  echo "Waiting for PD... (attempt $i)"
                  sleep 2
                done

                /tikv-server \
                  -C "${CONFIG_PATH}" \
                  --pd-endpoints="${PD_ENDPOINT}" \
                  --addr="${LISTEN_ADDRESSES}" \
                  --data-dir=/tikv-data &
                TIKV_PID=$!
                while [ ! -f /lifecycle/done ]; do sleep 2; done
                kill $TIKV_PID 2>/dev/null || true
                exit 0
            volumeMounts:
              - name: tikv-data
                mountPath: /tikv-data
              - name: lifecycle
                mountPath: /lifecycle
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
          - name: test
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-27-g440b0c8-go1.25
            command: [bash, -ce]
            env:
              - name: GOTOOLCHAIN
                value: local
            args:
              - |
                #!/usr/bin/env bash
                set -euo pipefail

                wait_for_http() {
                  local url=$1
                  local name=$2
                  for i in $(seq 1 30); do
                    if curl -fsS --max-time 2 "${url}" >/dev/null; then
                      echo "${name} is ready"
                      return
                    fi
                    sleep 1
                  done
                  echo "${name} did not become ready" >&2
                  return 1
                }

                exit_code=0
                wait_for_http http://127.0.0.1:9000/minio/health/ready MinIO || exit_code=$?
                wait_for_http http://127.0.0.1:2379/pd/api/v1/health PD || exit_code=$?
                wait_for_http http://127.0.0.1:20160/status TiKV || exit_code=$?

                if [ "$exit_code" -ne 0 ]; then
                  touch /lifecycle/done
                  exit "$exit_code"
                fi

                # 👉 Run the integration tests
                cd integration_tests
                go version
                go run gotest.tools/gotestsum@v1.13.0 --format short-verbose -- -parallel 1 -tags=nextgen --with-tikv --keyspace-name='keyspace1' || exit_code=$?

                # Signal sidecars to shut down
                touch /lifecycle/done
                exit "$exit_code"
            volumeMounts:
              - name: lifecycle
                mountPath: /lifecycle
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
