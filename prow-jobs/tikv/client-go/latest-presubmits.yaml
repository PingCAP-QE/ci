global_definitions:
  brancher: &brancher
    branches:
      - ^master$
      - ^release-nextgen-[0-9]+$
      - ^feature/.*$
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  affinity: &affinity
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  tikv/client-go:
    - <<: [*brancher]
      name: pull-client-go-integration-next-gen-tikv
      agent: kubernetes
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      optional: true
      trigger: "(?m)^/test (?:.*? )?(pull-client-go-integration-next-gen-tikv|all)(?: .*?)?$"
      rerun_command: "/test pull-client-go-integration-next-gen-tikv"
      timeout: 45m
      spec:
        affinity: *affinity
        volumes:
          - name: minio-data
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: hyperdisk-rwo
        containers:
          - name: test
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-27-g440b0c8-go1.25
            command: [bash, -ce]
            env:
              - name: GOTOOLCHAIN
                value: local
              - name: OCI_ARTIFACT_HOST
                value: us-docker.pkg.dev/pingcap-testing-account/tidbx
            args:
              - |
                #!/usr/bin/env bash
                set -euo pipefail

                dump_logs() {
                  for log_file in minio.log pd.log tikv.log; do
                    echo "--- ${log_file} ---"
                    tail -n 200 "${log_file}" || echo "${log_file} not found"
                  done
                }

                cleanup() {
                  local status=$?
                  if [[ ${status} -ne 0 ]]; then
                    dump_logs
                  fi
                  for pid in "${TIKV_PID:-}" "${PD_PID:-}" "${MINIO_PID:-}"; do
                    if [[ -n "${pid}" ]]; then
                      kill "${pid}" 2>/dev/null || true
                    fi
                  done
                  exit "${status}"
                }

                wait_for_http() {
                  local url=$1
                  local name=$2
                  for i in $(seq 1 30); do
                    if curl -fsS --max-time 2 "${url}" >/dev/null; then
                      echo "${name} is ready"
                      return
                    fi
                    sleep 1
                  done
                  echo "${name} did not become ready" >&2
                  return 1
                }

                trap cleanup EXIT

                # download peer components
                if [[ "${BASE_REF:-}" =~ ^release-nextgen-[0-9]+$ ]]; then
                  OCI_TAG_PD="${BASE_REF}"
                  OCI_TAG_TIKV="${BASE_REF}"
                else
                  OCI_TAG_PD="master-nextgen"
                  OCI_TAG_TIKV="cloud-engine-nextgen"
                fi
                OCI_TAG_MINIO="RELEASE.2025-07-23T15-54-02Z"
                mkdir -p binaries
                pushd binaries
                  oci_script=/tmp/download_pingcap_oci_artifact.sh
                  curl -fsSL https://raw.githubusercontent.com/PingCAP-QE/ci/main/scripts/artifacts/download_pingcap_oci_artifact.sh -o "${oci_script}"
                  chmod +x "${oci_script}"
                  "${oci_script}" --pd=${OCI_TAG_PD} --tikv=${OCI_TAG_TIKV} --minio=${OCI_TAG_MINIO}
                popd

                cd integration_tests
                mkdir -p tikv-data /minio-data/cse-test

                binaries/minio server /minio-data > minio.log 2>&1 &
                MINIO_PID=$!
                wait_for_http http://127.0.0.1:9000/minio/health/ready MinIO

                binaries/pd-server --config pd_next_gen.toml > pd.log 2>&1 &
                PD_PID=$!
                wait_for_http http://127.0.0.1:2379/pd/api/v1/health PD

                binaries/tikv-server -C tikv_next_gen.toml --pd-endpoints="127.0.0.1:2379" --addr="127.0.0.1:20160" --data-dir="${PWD}/tikv-data" > tikv.log 2>&1 &
                TIKV_PID=$!

                echo "Waiting for Next-Gen TiKV to start..."
                sleep 15
                dump_logs

                # 👉 Run the integration tests
                go version
                go run gotest.tools/gotestsum@v1.13.0 --format short-verbose -- -parallel 1 -tags=nextgen --with-tikv --keyspace-name='keyspace1'
            volumeMounts:
              - name: minio-data
                mountPath: /minio-data
            resources:
              limits:
                cpu: "6"
                memory: 12Gi
