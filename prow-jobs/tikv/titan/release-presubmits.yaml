            command:
              - bash
              - ../../PingCAP-QE/ci/scripts/tikv/titan/test-release.sh
            env:
              - name: SANITIZER
                value: UBSAN
            resources:
              requests:
                cpu: "4"
                memory: 8Gi
              limits:
                cpu: "4"
                memory: 8Gi

    - <<: *brancher
      name: pull-titan-release
      decorate: true
      extra_refs:
        - org: PingCAP-QE
          repo: ci
          base_ref: main
          repo_link: https://github.com/PingCAP-QE/ci
      decoration_config:
        timeout: 3h
      always_run: false
      optional: true
      skip_if_only_changed: *skip_if_only_changed
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
        containers:
          - name: builder
