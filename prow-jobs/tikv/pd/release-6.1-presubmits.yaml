global_definitions:
  branches: &branches
    - ^release-6\.1(\.\d+)?(-\d+)?(-v[\.\d]+)?$
    - ^feature/release-6.1(.\d+)?-.+$
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  affinity: &affinity
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  tikv/pd:
    - name: pull-build-release-6.1
      agent: kubernetes
      decorate: true # need add this.
      # TODO(@wuhuizuo): migrate image hub.pingcap.net/ee/ci/base:v20230803-go1.19.12 to a public registry.
      skip_if_only_changed: *skip_if_only_changed
      branches: *branches
      spec:
        affinity: *affinity
        containers:
          - name: build
            image: hub.pingcap.net/ee/ci/base:v20230803-go1.19.12
            command: [bash, -ce]
            args:
              - |
                WITH_RACE=1 make && mv bin/pd-server bin/pd-server-race
                make
            resources:
              limits:
                memory: 8Gi
                cpu: "4"
