# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tidb-engine-ext:
    - name: pull-unit-test
      decorate: true # need add this.
      always_run: true
      skip_submodules: true
      clone_depth: 1
      branches:
        - ^(raftstore-proxy-)?6\.1\d*(\.\d+)?(\-.*)?$
      spec:
        containers:
          - name: unit-test
            image: ghcr.io/pingcap-qe/cd/builders/tiflash:v2026.3.8-1-g9d412f4_linux_amd64
            command: [bash, -ce]
            args:
              - |
                set -euox pipefail
                make ci_fmt_check
                make ci_test
            env:
              - name: CARGO_NET_GIT_FETCH_WITH_CLI
                value: "true"
            resources:
              limits:
                memory: 16Gi
                cpu: "12"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
