# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
# TODO(@wuhuizuo): migrate image hub.pingcap.net/tiflash/tiflash-llvm-base:amd64 to a public registry.
presubmits:
  pingcap/tidb-engine-ext:
    - name: pull-unit-test
      decorate: true # need add this.
      always_run: true
      skip_submodules: true
      clone_depth: 0 # do a full clone.
      branches:
        - ^master$
        - ^raftstore-proxy$
        - ^(raftstore-proxy-)?6\.[2-9]\d*(\.\d+)?(\-.*)?$
        - ^(raftstore-proxy-)?[789]\.[0-9]\d*(\.\d+)?(\-.*)?$
      spec:
        containers:
          - name: unit-test
            image: hub.pingcap.net/tiflash/tiflash-llvm-base:amd64
            command: [bash, -ce]
            args:
              - |
                set -euox pipefail
                make ci_fmt_check
                make ci_test
            env:
              - name: CARGO_NET_GIT_FETCH_WITH_CLI
                value: "true"
            resources:
              limits:
                memory: 32Gi
                cpu: "12"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
