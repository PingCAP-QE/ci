global_definitions:
  brancher: &brancher
    branches:
      - ^master$

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tidb:
    - <<: *brancher
      name: canary-unit-test
      agent: kubernetes
      cluster: default
      decorate: true
      skip_submodules: true
      clone_depth: 1
      max_concurrency: 2
      always_run: false
      optional: true
      context: canary-unit-test
      trigger: "(?m)^/test (?:.*? )?canary-unit-test(?: .*?)?$"
      rerun_command: "/test canary-unit-test"
      spec:
        containers:
          - name: test
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-20-gc13354a-go1.25
            command: [bash, -ce]
            args:
              - |
                make gotest_in_verify_ci
            resources:
              limits:
                memory: 24Gi
                cpu: "12"

    - <<: *brancher
      name: canary-long-unit-test
      agent: kubernetes
      cluster: default
      decorate: true
      skip_submodules: true
      clone_depth: 1
      always_run: false
      optional: true
      context: canary-long-unit-test
      trigger: "(?m)^/test (?:.*? )?canary-long-unit-test(?: .*?)?$"
      rerun_command: "/test canary-long-unit-test"
      spec:
        containers:
          - name: test
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-20-gc13354a-go1.25
            command: [bash, -ce]
            args:
              - |
                make ut-long
            resources:
              limits:
                memory: 12Gi
                cpu: "6"
