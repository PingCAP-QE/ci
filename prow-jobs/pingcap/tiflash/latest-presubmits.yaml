# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
global_definitions:
  brancher: &brancher
    branches:
      - ^master$
      - ^feature/.+
      - ^release-fts-[0-9]+$
    skip_branches: # skip feature branches based on released version.
      - ^feature/release-\d+\.\d+(.\d+)?-.+$
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tiflash:
    - <<: *brancher
      agent: jenkins
      labels:
        master: "0"
      context: pull-unit-test
      decorate: false # need add this.
      name: pingcap/tiflash/pull_unit_test
      optional: false
      rerun_command: "/test pull-unit-test"
      skip_if_only_changed: *skip_if_only_changed
      skip_report: false
      trigger: "(?m)^/test (?:.*? )?(pull-unit-test)(?: .*?)?$"

    - <<: *brancher
      agent: jenkins
      labels:
        master: "0"
      context: pull-integration-test
      decorate: false # need add this.
      name: pingcap/tiflash/pull_integration_test
      optional: false
      rerun_command: "/test pull-integration-test"
      skip_if_only_changed: *skip_if_only_changed
      skip_report: false
      trigger: "(?m)^/test (?:.*? )?(pull-integration-test)(?: .*?)?$"

    - &pull_sanitizer_asan_job
      <<: *brancher
      name: pull-sanitizer-asan
      decorate: true
      always_run: false
      optional: true
      skip_if_only_changed: *skip_if_only_changed
      trigger: "(?m)^/test (?:.*? )?(pull-sanitizer-asan)(?: .*?)?$"
      rerun_command: "/test pull-sanitizer-asan"
      spec:
        containers:
          - name: run-sanitizer
            image: ghcr.io/pingcap-qe/cd/builders/tiflash:v2024.10.8-135-g43bfc3c-centos7
            imagePullPolicy: Always
            command: [/bin/bash, -ce]
            env:
              - name: SANITIZER
                value: ASan
            args:
              - |
                set -euo pipefail

                if ! command -v ccache >/dev/null 2>&1; then
                  yum install -y ccache
                fi

                sanitizer="${SANITIZER:-ASan}"
                if [[ "${sanitizer}" != "ASan" && "${sanitizer}" != "TSan" ]]; then
                  echo "unsupported sanitizer: ${sanitizer}" >&2
                  exit 1
                fi

                repo_root="$(pwd)"
                rm -rf "${repo_root}/.ccache" "${repo_root}/build-${sanitizer}"
                mkdir -p "${repo_root}/build-${sanitizer}"

                ccache -o cache_dir="$(realpath "${repo_root}/.ccache")" || true
                ccache -o max_size=2G || true
                ccache -o limit_multiple=0.99 || true
                ccache -o hash_dir=false || true
                ccache -o compression=true || true
                ccache -o compression_level=6 || true
                ccache -z || true

                (
                  cd "${repo_root}/build-${sanitizer}"
                  cmake "${repo_root}" \
                    -DCMAKE_CXX_COMPILER=clang++ \
                    -DCMAKE_C_COMPILER=clang \
                    -DENABLE_TESTS=ON \
                    -DCMAKE_BUILD_TYPE="${sanitizer}" \
                    -DUSE_CCACHE=ON \
                    -DRUN_HAVE_STD_REGEX=0 \
                    -DCMAKE_PREFIX_PATH=/usr/local \
                    -DUSE_GM_SSL=0 \
                    -GNinja
                  ninja -j12 gtests_dbms gtests_libcommon gtests_libdaemon
                )

                rm -rf /tests /tiflash
                ln -s "${repo_root}/tests" /tests
                mkdir -p /tiflash
                cp "${repo_root}/build-${sanitizer}/dbms/gtests_dbms" /tiflash
                cp "${repo_root}/build-${sanitizer}/libs/libcommon/src/tests/gtests_libcommon" /tiflash
                cp "${repo_root}/build-${sanitizer}/libs/libdaemon/src/tests/gtests_libdaemon" /tiflash

                source /tests/docker/util.sh
                show_env
                UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=0 \
                LSAN_OPTIONS=suppressions=/tests/sanitize/asan.suppression \
                TSAN_OPTIONS="suppressions=/tests/sanitize/tsan.suppression" \
                ENV_VARS_PATH=/tests/docker/_env.sh \
                NPROC=12 \
                /tests/run-gtest.sh
            resources:
              requests:
                cpu: "12"
                memory: 32Gi
              limits:
                cpu: "20"
                memory: 64Gi
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64

    - &pull_sanitizer_tsan_job
      <<: *brancher
      name: pull-sanitizer-tsan
      decorate: true
      always_run: false
      optional: true
      skip_if_only_changed: *skip_if_only_changed
      trigger: "(?m)^/test (?:.*? )?(pull-sanitizer-tsan)(?: .*?)?$"
      rerun_command: "/test pull-sanitizer-tsan"
      spec:
        containers:
          - name: run-sanitizer
            image: ghcr.io/pingcap-qe/cd/builders/tiflash:v2024.10.8-135-g43bfc3c-centos7
            imagePullPolicy: Always
            command: [/bin/bash, -ce]
            env:
              - name: SANITIZER
                value: TSan
            args:
              - |
                set -euo pipefail

                if ! command -v ccache >/dev/null 2>&1; then
                  yum install -y ccache
                fi

                sanitizer="${SANITIZER:-TSan}"
                if [[ "${sanitizer}" != "ASan" && "${sanitizer}" != "TSan" ]]; then
                  echo "unsupported sanitizer: ${sanitizer}" >&2
                  exit 1
                fi

                run_with_sanitizer_runtime() {
                  "$@"
                }
                if [[ "${sanitizer}" == "TSan" ]] && command -v setarch >/dev/null 2>&1; then
                  arch_name="$(uname -m)"
                  run_with_sanitizer_runtime() {
                    setarch "${arch_name}" -R "$@"
                  }
                fi

                repo_root="$(pwd)"
                rm -rf "${repo_root}/.ccache" "${repo_root}/build-${sanitizer}"
                mkdir -p "${repo_root}/build-${sanitizer}"

                ccache -o cache_dir="$(realpath "${repo_root}/.ccache")" || true
                ccache -o max_size=2G || true
                ccache -o limit_multiple=0.99 || true
                ccache -o hash_dir=false || true
                ccache -o compression=true || true
                ccache -o compression_level=6 || true
                ccache -z || true

                (
                  cd "${repo_root}/build-${sanitizer}"
                  cmake "${repo_root}" \
                    -DCMAKE_CXX_COMPILER=clang++ \
                    -DCMAKE_C_COMPILER=clang \
                    -DENABLE_TESTS=ON \
                    -DCMAKE_BUILD_TYPE="${sanitizer}" \
                    -DUSE_CCACHE=ON \
                    -DRUN_HAVE_STD_REGEX=0 \
                    -DCMAKE_PREFIX_PATH=/usr/local \
                    -DUSE_GM_SSL=0 \
                    -GNinja
                  run_with_sanitizer_runtime ninja -j12 gtests_dbms gtests_libcommon gtests_libdaemon
                )

                rm -rf /tests /tiflash
                ln -s "${repo_root}/tests" /tests
                mkdir -p /tiflash
                cp "${repo_root}/build-${sanitizer}/dbms/gtests_dbms" /tiflash
                cp "${repo_root}/build-${sanitizer}/libs/libcommon/src/tests/gtests_libcommon" /tiflash
                cp "${repo_root}/build-${sanitizer}/libs/libdaemon/src/tests/gtests_libdaemon" /tiflash

                source /tests/docker/util.sh
                show_env
                UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=0 \
                LSAN_OPTIONS=suppressions=/tests/sanitize/asan.suppression \
                TSAN_OPTIONS="suppressions=/tests/sanitize/tsan.suppression" \
                ENV_VARS_PATH=/tests/docker/_env.sh \
                NPROC=12 \
                run_with_sanitizer_runtime /tests/run-gtest.sh
            resources:
              requests:
                cpu: "12"
                memory: 32Gi
              limits:
                cpu: "20"
                memory: 64Gi
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64

    - name: pull-error-log-review
      branches:
        - ^master$
        - ^release-fts-[0-9]+$
      decorate: true
      decoration_config:
        timeout: 20m
        skip_cloning: true
      always_run: false
      trigger: "(?m)^/test (?:.*? )?pull-error-log-review(?: .*?)?$"
      rerun_command: "/test pull-error-log-review"
      optional: true
      # skip_if_only_changed: *skip_if_only_changed # TODO: add this after test is checked and stable.
      spec:
        containers:
          - name: check
            image: ghcr.io/pingcap-qe/ci/base:v2024.10.8-32-ge807718-go1.23
            command: [/bin/bash, -ce]
            args:
              - |
                if [[ "${JOB_TYPE:-}" == "batch" ]]; then
                  echo "JOB_TYPE is batch, skipping error log review check"
                  exit 0
                fi
                wget -O /tmp/config.yaml https://raw.githubusercontent.com/pingcap-qe/ci/main/configs/error-log-review/config.yaml
                go run github.com/PingCAP-QE/ci/tools/error-log-review@main \
                  -config /tmp/config.yaml \
                  -pr "${REPO_OWNER}/${REPO_NAME}#${PULL_NUMBER}"
            env:
              - name: GITHUB_API_TOKEN
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: github-token
            resources:
              requests:
                cpu: "1"
                memory: 2Gi
              limits:
                cpu: "1"
                memory: 2Gi
