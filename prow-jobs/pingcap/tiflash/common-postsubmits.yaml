# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Postsubmit
postsubmits:
  pingcap/tiflash:
    - name: sync-owners-to-release-branches
      decorate: true
      decoration_config:
        skip_cloning: true
      skip_report: true
      max_concurrency: 1
      run_if_changed: "(^|.*/)(OWNERS|OWNERS_ALIASES)$"
      branches:
        - ^master$
      spec:
        containers:
          - name: main
            image: denoland/deno:2.2.2
            command:
              - deno
              - run
              - --allow-all
              - https://github.com/PingCAP-QE/ci/raw/main/scripts/plugins/sync-owners-to-release.ts
            args:
              - --owner=$(REPO_OWNER)
              - --repository=$(REPO_NAME)
              - --source_branch=$(PULL_BASE_REF)
              - --target_branch=release-7.5
              - --target_branch=release-8.1
              - --target_branch=release-8.5
              - --github_private_token=$(GITHUB_API_TOKEN)
            env:
              - name: GITHUB_API_TOKEN
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: github-token
            resources:
              limits:
                cpu: "1"
                memory: 1Gi
              requests:
                cpu: "1"
                memory: 1Gi
