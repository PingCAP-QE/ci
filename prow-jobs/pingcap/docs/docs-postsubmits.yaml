# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Postsubmit
postsubmits:
  pingcap/docs:
    - name: pingcap/docs/merged_update_docs
      agent: kubernetes
      cluster: default
      decorate: true
      decoration_config:
        timeout: 100m
      context: docs/merged-ci
      max_concurrency: 5
      skip_report: false
      branches:
        - ^master$
        - ^release-6\.[15]$
        - ^release-7\.[15]$
        - ^release-8\.[15]$
      spec:
        containers:
          - name: build-pdf
            image: pandoc/extra:latest-ubuntu
            imagePullPolicy: Always
            command: [bash, -ce]
            args:
              - |
                set -euo pipefail

                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends python3 rclone fonts-wqy-microhei
                rm -rf /var/lib/apt/lists/*
                fc-cache -fv >/dev/null || true

                branch="${PULL_BASE_REF:?missing PULL_BASE_REF}"
                repo_dir="/home/prow/go/src/github.com/${REPO_OWNER:?missing REPO_OWNER}/${REPO_NAME:?missing REPO_NAME}"
                cd "${repo_dir}"

                if find . -name '*.md' -print0 | xargs -0 grep -P '\t'; then
                  echo "Found tab characters in markdown sources." >&2
                  exit 1
                fi

                python3 scripts/merge_by_toc.py
                scripts/generate_pdf.sh

                if [ "${branch}" = "release-8.5" ]; then
                  python3 scripts/merge_by_toc.py TOC-tidb-cloud.md doc_cloud.md tidb-cloud
                  scripts/generate_cloud_pdf.sh
                fi

                dst="${TENCENTCLOUD_RCLONE_CONN:?missing TENCENTCLOUD_RCLONE_CONN}:${TENCENTCLOUD_BUCKET_ID:?missing TENCENTCLOUD_BUCKET_ID}/pdf"
                case "${branch}" in
                  master)
                    version="dev"
                    ;;
                  release-8.5)
                    version="stable"
                    ;;
                  release-*)
                    version="v${branch#release-}"
                    ;;
                  *)
                    echo "Error: Unexpected base ref: ${branch}" >&2
                    exit 1
                    ;;
                esac

                rclone copyto output.pdf "${dst}/tidb-${version}-en-manual.pdf"
                if [ -f output_cloud.pdf ]; then
                  rclone copyto output_cloud.pdf "${dst}/tidbcloud-en-manual.pdf"
                fi
            env:
              - name: TENCENTCLOUD_RCLONE_CONN
                valueFrom:
                  secretKeyRef:
                    name: docs-cn
                    key: docs-cn-tencent-ak
              - name: TENCENTCLOUD_BUCKET_ID
                valueFrom:
                  secretKeyRef:
                    name: docs-cn
                    key: docs-cn-tencent-bn
            resources:
              requests:
                memory: 12Gi
                cpu: "4"
              limits:
                memory: 12Gi
                cpu: "4"
            securityContext:
              runAsUser: 0
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
