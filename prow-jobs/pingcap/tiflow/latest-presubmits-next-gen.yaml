global_definitions:
  branches: &branches
    - ^release-nextgen-.*$
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tiflow:
    - name: pingcap/tiflow/pull_dm_integration_test_next_gen
      agent: jenkins
      labels:
        master: "1"
      decorate: false # need add this.
      always_run: false
      skip_if_only_changed: *skip_if_only_changed
      run_before_merge: true
      optional: true
      context: pull-dm-integration-test-next-gen
      trigger: "(?m)^/test (?:.*? )?(pull-dm-integration-test-next-gen|next-gen-dm|next-gen)(?: .*?)?$"
      rerun_command: "/test pull-dm-integration-test-next-gen"
      branches: *branches
