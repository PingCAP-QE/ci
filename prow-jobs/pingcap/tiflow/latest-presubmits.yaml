global_definitions:
  branches: &branches
    - ^master$
    - ^feature/.+
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  skip_if_only_changed_non_ticdc_files: &skip_if_only_changed_non_ticdc_files "(^dm/|^engine/|^cmd/dm-[^/]+/|(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$)"

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tiflow:
    - name: pull-check
      cluster: default
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      branches: *branches
      spec:
        containers:
          - name: check
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-10-gc29110c-go1.25
            command: [bash, -ce]
            args:
              - |
                make check
            resources: &resources
              requests:
                memory: 12Gi
                cpu: "3"
              limits:
                memory: 24Gi
                cpu: "6"

    - name: pull-build
      cluster: default
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      branches: *branches
      spec:
        containers:
          - name: build
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-10-gc29110c-go1.25
            command: [bash, -ce]
            args:
              - |
                make build
            resources: *resources

    - name: pull-unit-test-cdc
      cluster: default
      decorate: true
      skip_if_only_changed: *skip_if_only_changed
      branches: *branches
      spec:
        containers:
          - name: cdc-unit-test
            image: ghcr.io/pingcap-qe/ci/base:v2026.4.12-10-gc29110c-go1.25
            command: [bash, -ce]
            args:
              - |
                # Preserve junit artifacts for Prow even when tests fail.
                archive_junit_reports() {
                  local report
                  shopt -s globstar nullglob
                  mkdir -p "${ARTIFACTS}" || return 0
                  for report in ./**/*-junit-report.xml; do
                    cp -f "$report" "${ARTIFACTS}/$(basename "$report")" || true
                  done
                }
                trap archive_junit_reports EXIT

                make unit_test_in_verify_ci
                if [ -f /tmp/tidb_cdc_test/cov.unit.out ] && [ "${JOB_TYPE:-}" != "batch" ]; then
                  codecov -f /tmp/tidb_cdc_test/cov.unit.out -F unit,cdc -r "pingcap/tiflow" -C "${PULL_PULL_SHA}" -B "${PULL_BASE_REF}" --pr "${PULL_NUMBER}" -Z || true
                fi
            env:
              - name: CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-tokens
                    key: pingcap-tiflow # format <ORG>-<REPO>
              # FIXME(wuhuizuo): should delete it when refactored the Makefile.
              - name: TICDC_CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-tokens
                    key: pingcap-tiflow # format <ORG>-<REPO>
            resources:
              requests:
                memory: 24Gi
                cpu: "6"
              limits:
                memory: 24Gi
                cpu: "6"

    - name: pingcap/tiflow/pull_cdc_integration_kafka_test
      agent: jenkins
      labels:
        master: "1"
      decorate: false # need add this.
      always_run: false
      skip_if_only_changed: *skip_if_only_changed_non_ticdc_files
      run_before_merge: true
      context: pull-cdc-integration-kafka-test
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-integration-kafka-test|all)(?: .*?)?$"
      rerun_command: "/test pull-cdc-integration-kafka-test"
      branches: *branches

