# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tiflow:
    - name: wip-pull-unit-test-dm
      cluster: default
      decorate: true # need add this.
      always_run: false # debug
      # skip_if_only_changed: "(\\.md|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      branches:
        - ^master$
        - ^feature[_/].+
      spec:
        containers:
          - name: dm-unit-test
            image: ghcr.io/pingcap-qe/ci/base:v2026.3.8-1-g9d412f4-go1.25
            command: [bash, -ce]
            args:
              - |
                make dm_unit_test_in_verify_ci
                codecov -Z --flags unit,dm -f /tmp/dm_test/cov.unit.out \
                  --pr ${PULL_NUMBER} \
                  --sha ${PULL_PULL_SHA} \
                  --branch origin/pr/${PULL_NUMBER}
            env:
              - name: CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-tokens
                    key: pingcap-tiflow # format <ORG>-<REPO>
              # FIXME(wuhuizuo): should delete it when refactored the Makefile.
              - name: TICDC_CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-tokens
                    key: pingcap-tiflow # format <ORG>-<REPO>
            resources:
              requests:
                memory: 12Gi
                cpu: "3"
              limits:
                memory: 24Gi
                cpu: "6"
    - name: wip-pull-unit-test-engine
      cluster: default
      decorate: true # need add this.
      always_run: false # debug
      # skip_if_only_changed: "(\\.md|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      branches:
