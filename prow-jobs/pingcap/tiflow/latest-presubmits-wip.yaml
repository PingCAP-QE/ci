                  --pr ${PULL_NUMBER} \
                  --sha ${PULL_PULL_SHA} \
                  --branch origin/pr/${PULL_NUMBER}
            env:
              - name: CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-tokens
                    key: pingcap-tiflow # format <ORG>-<REPO>
              # FIXME(wuhuizuo): should delete it when refactored the Makefile.
              - name: TICDC_CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-tokens
                    key: pingcap-tiflow # format <ORG>-<REPO>
            resources:
              requests:
                memory: 12Gi
                cpu: "3"
              limits:
                memory: 24Gi
                cpu: "6"
