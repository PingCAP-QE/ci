# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Postsubmit
postsubmits:
  pingcap/docs-cn:
    - name: docs-cn-merged-update-docs
      agent: kubernetes
      cluster: default
      decorate: true
      decoration_config:
        timeout: 60m
      context: docs-cn/merged-ci
      max_concurrency: 5
      branches:
        - ^master$
        - ^release-6\.[15]$
        - ^release-7\.[15]$
        - ^release-8\.[15]$
      spec:
        containers:
          - name: build-pdf
            image: ghcr.io/pingcap-qe/cd/builders/docs:v2026.4.12-47-gbef444c_linux_amd64
            imagePullPolicy: IfNotPresent
            command: [bash, -c]
            args:
              - |
                set -euo pipefail

                branch="${PULL_BASE_REF:?missing PULL_BASE_REF}"
                repo_dir="/home/prow/go/src/github.com/${REPO_OWNER:?missing REPO_OWNER}/${REPO_NAME:?missing REPO_NAME}"
                cd "${repo_dir}"

                if find . -name '*.md' -print0 | xargs -0 grep -P '\t'; then
                  echo "Found tab characters in markdown sources." >&2
                  exit 1
                fi

                python3 scripts/merge_by_toc.py
                scripts/generate_pdf.sh

                export RCLONE_CONFIG_GCS_TYPE="google cloud storage"
                gcs_dst="gcs:prow-tidb-logs/artifacts/pdf"
                case "${branch}" in
                  master)
                    version="dev"
                    ;;
                  release-8.5)
                    version="stable"
                    ;;
                  release-*)
                    version="v${branch#release-}"
                    ;;
                  *)
                    echo "Error: Unexpected base ref: ${branch}" >&2
                    exit 1
                    ;;
                esac

                rclone copyto --progress output.pdf "${gcs_dst}/tidb-${version}-zh-manual.pdf"
            resources:
              requests:
                memory: 2Gi
                cpu: "1"
              limits:
                memory: 4Gi
                cpu: "1"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
