global_definitions:
  brancher: &brancher
    branches:
      - ^master$
      - ^release-6[.][1-9].*$
      - ^release-[78][.].*$
  integration_brancher: &integration_brancher
    branches:
      - ^release-8[.]1([.-].*)?$
      - ^release-7[.]5([.-].*)?$
      - ^release-7[.]1([.-].*)?$

  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap/tidb-binlog:
    - <<: *brancher
      name: pull-build
      agent: kubernetes
      decorate: true # need add this.
      skip_if_only_changed: *skip_if_only_changed
      context: idc-jenkins-ci-binlog/build
      spec:
        containers:
          - name: build
            image: ghcr.io/pingcap-qe/cd/builders/tidb:v2024.10.8-12-gb9ffe36-centos7-go1.21
            command: [bash, -ce]
            args:
              - |
                make build
            resources:
              limits:
                memory: 8Gi
                cpu: "4"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
    - <<: *brancher
      name: pull-check
      agent: kubernetes
      decorate: true # need add this.
      skip_if_only_changed: *skip_if_only_changed
      context: idc-jenkins-ci-binlog/check
      spec:
        containers:
          - name: build
            image: ghcr.io/pingcap-qe/cd/builders/tidb:v2024.10.8-12-gb9ffe36-centos7-go1.21
            command: [bash, -ce]
            args:
              - |
                make check
            resources:
              limits:
                memory: 8Gi
                cpu: "4"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
    - <<: *brancher
      name: pull-unit-test
      agent: kubernetes
      # TODO(@wuhuizuo): migrate image hub.pingcap.net/jenkins/centos7_golang-1.21:latest to a public registry.
      decorate: true # need add this.
      skip_if_only_changed: *skip_if_only_changed
      context: idc-jenkins-ci-tidb-binlog/unit-test
      spec:
        containers:
          - name: build
            image: hub.pingcap.net/jenkins/centos7_golang-1.21:latest # UID is 1000
            command: [bash, -ce]
            args:
              - |
                make test
            resources:
              limits:
                memory: 16Gi
                cpu: "8"
        securityContext:
          fsGroup: 1000
          runAsUser: 1000
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
    - <<: *integration_brancher
      name: pull-integration-test
      agent: kubernetes
      decorate: true
      decoration_config:
        timeout: 120m
      optional: false
      skip_if_only_changed: *skip_if_only_changed
      # TiDB Binlog is removed from TiDB >= 8.3. Keep this integration job focused on
      # the maintained legacy-compatible lines only.
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
        containers:
          - name: build
            image: ghcr.io/pingcap-qe/ci/base:v2024.10.8-81-gec616ff-go1.21
            command: [bash, -ce]
            env:
              - name: OCI_ARTIFACT_HOST
                value: us-docker.pkg.dev/pingcap-testing-account/hub
              - name: TIDB_BINLOG_SUPPORTED_REFS
                value: release-8.1,release-7.5,release-7.1
            args:
              - |
                trap 'touch /tools/run.done' EXIT
                curl -fsSL --retry 3 \
                  https://raw.githubusercontent.com/PingCAP-QE/ci/main/scripts/pingcap/tidb-binlog/pull_integration_test.sh \
                  -o /tmp/pull_integration_test.sh
                bash /tmp/pull_integration_test.sh
            resources:
              requests:
                memory: 8Gi
                cpu: "4"
              limits:
                memory: 8Gi
                cpu: "4"
          - name: zookeeper
            image: wurstmeister/zookeeper
            command: [bash, -ce]
            args:
              - |
                echo "🚩 This is the Zookeeper server."

                # Start Zookeeper in the background
                bash /usr/bin/start-zk.sh > /logs/artifacts/container-output-zookeeper.log 2>&1 &
                ZK_PID=$!

                # Function to handle termination signal
                terminate() {
                  kill -9 $ZK_PID 2>/dev/null && echo "Killed Zookeeper process."
                  wait $ZK_PID 2>/dev/null && echo "Zookeeper process stopped."
                  echo "🏁 Zookeeper stopped."
                  exit 0
                }

                # Trap termination signals
                trap 'terminate' SIGTERM SIGINT

                # Exit when /tools/run.done file exists.
                while [ ! -f /tools/run.done ]; do
                  sleep 1
                  echo -n '.'
                done

                # Call the terminate function to stop Zookeeper
                echo "👀 Saw termination flag, exiting."
                terminate
            resources:
              requests:
                memory: 4Gi
                cpu: "2"
          - name: kafka
            image: wurstmeister/kafka:2.12-2.4.1
            command: [bash, -ce]
            args:
              - |
                echo "🚩 This is the Kafka server."

                # Start Kafka in the background
                start-kafka.sh > /logs/artifacts/container-output-kafka.log 2>&1 &
                KAFKA_PID=$!

                # Function to handle termination signal
                terminate() {
                  kill -9 $KAFKA_PID 2>/dev/null && echo "Killed Kafka process."
                  wait $KAFKA_PID 2>/dev/null && echo "Kafka process stopped."
                  echo "🏁 Kafka stopped."
                  exit 0
                }

                # Trap termination signals
                trap 'terminate' SIGTERM SIGINT

                # Exit when /tools/run.done file exists.
                while [ ! -f /tools/run.done ]; do
                  sleep 1
                  echo -n '.'
                done

                # Call the terminate function to stop Kafka
                echo "👀 Saw termination flag, exiting."
                terminate
            env:
              - name: KAFKA_MESSAGE_MAX_BYTES
                value: "1073741824"
              - name: KAFKA_REPLICA_FETCH_MAX_BYTES
                value: "1073741824"
              - name: KAFKA_BROKER_ID
                value: "1"
              - name: KAFKA_ADVERTISED_LISTENERS
                value: "PLAINTEXT://127.0.0.1:9092"
              - name: KAFKA_LISTENERS
                value: "PLAINTEXT://127.0.0.1:9092"
              - name: ZK
                value: "zk"
              - name: KAFKA_ZOOKEEPER_CONNECT
                value: "localhost:2181"
            resources:
              requests:
                memory: 4Gi
                cpu: "2"
