global_definitions:
  brancher: &brancher
    branches:
      - ^master$
      - ^release-.+$
      - ^feature/.+$
  skip_if_only_changed: &skip_if_only_changed "(\\.(md|png|jpeg|jpg|gif|svg|pdf|gitignore)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  decoration_config: &decoration_config
    timeout: 3h
    oauth_token_secret:
      name: github-token
      key: token

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap-inc/tiflash-scripts:
    - <<: *brancher
      name: pull-test
      decorate: true
      decoration_config: *decoration_config
      always_run: true
      context: pull-test
      trigger: "(?m)^/test (?:.*? )?(pull-test)(?: .*?)?$"
      rerun_command: "/test pull-test"
      skip_if_only_changed: *skip_if_only_changed
      max_concurrency: 3
      spec:
        volumes:
          - name: docker-sock-dir
            emptyDir: {}
          - name: docker-lib
            emptyDir: {}
        initContainers:
          - name: dind-daemon
            image: docker:28.1-dind
            restartPolicy: Always
            command:
              - /bin/sh
              - -c
              - dockerd-entrypoint.sh
            env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
            securityContext:
              privileged: true
            volumeMounts:
              - name: docker-sock-dir
                mountPath: /var/run
              - name: docker-lib
                mountPath: /var/lib/docker
            resources:
              requests:
                cpu: "1"
                memory: 4Gi
              limits:
                cpu: "1"
                memory: 4Gi
        containers:
          - name: run-test
            image: ubuntu:22.04
            imagePullPolicy: Always
            command: [/bin/bash, -ce]
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: OCI_ARTIFACT_HOST
                value: us-docker.pkg.dev/pingcap-testing-account/hub
            args:
              - |
                set -euo pipefail

                echo "repo=${REPO_OWNER}/${REPO_NAME} pr=${PULL_NUMBER:-unknown} base=${PULL_BASE_REF:-unknown}"
                echo "pwd=$(pwd)"
                git config --global --add safe.directory "*"

                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends \
                  ca-certificates \
                  curl \
                  docker-compose \
                  docker.io \
                  git \
                  jq \
                  maven \
                  openjdk-17-jdk \
                  python-is-python3 \
                  python3 \
                  tar \
                  xz-utils
                rm -rf /var/lib/apt/lists/*

                ORAS_VERSION="1.2.3"
                curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
                  | tar -xz -C /usr/local/bin oras
                chmod +x /usr/local/bin/oras

                YQ_VERSION="v4.47.2"
                curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
                chmod +x /usr/local/bin/yq

                if [[ -n "${PULL_PULL_SHA:-}" ]]; then
                  git fetch --depth=1 origin "${PULL_PULL_SHA}"
                  git checkout -f "${PULL_PULL_SHA}"
                fi

                echo "wait for docker daemon..."
                timeout_seconds=120
                start_time=$(date +%s)
                while ! docker info >/dev/null 2>&1; do
                  current_time=$(date +%s)
                  if (( current_time - start_time >= timeout_seconds )); then
                    echo "docker daemon did not become ready in ${timeout_seconds}s" >&2
                    exit 1
                  fi
                  sleep 3
                done
                docker info >/dev/null

                if [[ -f .ci/integration_test.groovy ]]; then
                  if [[ -f .ci/integration_test_native.sh ]]; then
                    echo "found .ci/integration_test.groovy and .ci/integration_test_native.sh, running native script"
                    chmod +x .ci/integration_test_native.sh
                    export TICS_TAG="${TICS_TAG:-${PULL_BASE_REF:-master}}"
                    export TIDB_BRANCH="${TIDB_BRANCH:-${PULL_BASE_REF:-master}}"
                    export TIKV_BRANCH="${TIKV_BRANCH:-${PULL_BASE_REF:-master}}"
                    export PD_BRANCH="${PD_BRANCH:-${PULL_BASE_REF:-master}}"
                    export STORAGE_ENGINE="${STORAGE_ENGINE:-}"
                    ./.ci/integration_test_native.sh
                    exit 0
                  fi

                  echo "found legacy .ci/integration_test.groovy but .ci/integration_test_native.sh is missing" >&2
                  echo "native prow cannot execute Jenkins Groovy; please provide .ci/integration_test_native.sh" >&2
                  exit 1
                fi

                tics_tag="${TICS_TAG:-${PULL_BASE_REF:-master}}"
                if [[ -z "${tics_tag}" || "${tics_tag}" == "raft" ]]; then
                  tics_tag="master"
                fi
                echo "tics_tag=${tics_tag}"

                rm -rf /tmp/tispark
                git clone --depth=1 --branch tiflash-ci-test https://github.com/pingcap/tispark.git /tmp/tispark
                (
                  cd /tmp/tispark
                  mvn install -Dmaven.test.skip=true
                )

                oci_script=/tmp/download_pingcap_oci_artifact.sh
                curl -fsSL https://raw.githubusercontent.com/PingCAP-QE/ci/main/scripts/artifacts/download_pingcap_oci_artifact.sh -o "${oci_script}"
                chmod +x "${oci_script}"

                artifact_dir=/tmp/oci-artifacts
                rm -rf "${artifact_dir}"
                mkdir -p "${artifact_dir}"
                (
                  cd "${artifact_dir}"
                  OCI_ARTIFACT_HOST="${OCI_ARTIFACT_HOST}" "${oci_script}" --tidb=master --tikv=master --pd=master
                  resolved_tiflash_tag="${tics_tag}"
                  if ! OCI_ARTIFACT_HOST="${OCI_ARTIFACT_HOST}" "${oci_script}" --tiflash="${resolved_tiflash_tag}"; then
                    echo "tiflash package tag '${resolved_tiflash_tag}' not found in OCI, fallback to master"
                    resolved_tiflash_tag="master"
                    OCI_ARTIFACT_HOST="${OCI_ARTIFACT_HOST}" "${oci_script}" --tiflash="${resolved_tiflash_tag}"
                  fi
                  echo "${resolved_tiflash_tag}" > .resolved_tiflash_tag
                )
                resolved_tiflash_tag="$(cat "${artifact_dir}/.resolved_tiflash_tag")"
                echo "resolved_tiflash_tag=${resolved_tiflash_tag}"

                mkdir -p integrated/binary/tidb integrated/binary/tikv integrated/binary/pd integrated/binary/tiflash
                cp -f "${artifact_dir}/tidb-server" integrated/binary/tidb/tidb-server
                cp -f "${artifact_dir}/tikv-server" integrated/binary/tikv/tikv-server
                cp -f "${artifact_dir}/pd-server" integrated/binary/pd/pd-server
                tar -czf integrated/binary/tiflash/tiflash.tar.gz -C "${artifact_dir}" tiflash

                if [[ -f integrated/tests/ci/jenkins.sh ]]; then
                  echo "run integrated/tests/ci/jenkins.sh"
                  (
                    cd integrated
                    /bin/bash tests/ci/jenkins.sh
                  )
                else
                  echo "skip integrated/tests/ci/jenkins.sh: file not found"
                fi

                cd tests/maven
                sed -i 's#hub.pingcap.net/qa/pd:#pingcap/pd:#g' docker-compose.yaml
                sed -i 's#hub.pingcap.net/qa/tikv:#pingcap/tikv:#g' docker-compose.yaml
                sed -i 's#hub.pingcap.net/qa/tidb:#pingcap/tidb:#g' docker-compose.yaml
                sed -i 's#hub.pingcap.net/tiflash/tiflash:#pingcap/tiflash:#g' docker-compose.yaml

                maven_branch="master"
                public_tiflash_tag="${resolved_tiflash_tag}"
                if ! docker manifest inspect "pingcap/tiflash:${public_tiflash_tag}" >/dev/null 2>&1; then
                  echo "public tiflash image tag '${public_tiflash_tag}' not found, fallback to master"
                  public_tiflash_tag="master"
                fi

                pulled=0
                for i in $(seq 1 20); do
                  if docker pull "pingcap/tiflash:${public_tiflash_tag}"; then
                    pulled=1
                    break
                  fi
                  sleep 5
                done
                if [[ "${pulled}" -ne 1 ]]; then
                  echo "failed to pull pingcap/tiflash:${public_tiflash_tag}" >&2
                  exit 1
                fi

                if ! BRANCH="${maven_branch}" TAG="${public_tiflash_tag}" /bin/bash -xe run.sh; then
                  while IFS= read -r -d '' file; do
                    echo "LOG: ${file}"
                    tail -n 500 "${file}" || true
                  done < <(find log -name '*.log' -type f -print0)
                  exit 1
                fi
            volumeMounts:
              - name: docker-sock-dir
                mountPath: /var/run
              - name: docker-lib
                mountPath: /var/lib/docker
            resources:
              requests:
                cpu: "4"
                memory: 12Gi
              limits:
                cpu: "4"
                memory: 12Gi
