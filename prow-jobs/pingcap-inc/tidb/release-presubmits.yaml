global_definitions:
  brancher: &brancher
    branches:
      - ^release-.*$
      - ^feature/release-8[.]5[.]5-active-active$
  k8s_job: &k8s_job
    decorate: true
    decoration_config:
      oauth_token_secret:
        name: github-token
        key: token
  jenkins_job: &jenkins_job
    agent: jenkins
    decorate: false
    labels:
      master: "1" # run on GCP

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap-inc/tidb:
    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_build
      skip_if_only_changed: "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      context: pull-build
      trigger: "(?m)^/test (?:.*? )?build(?: .*?)?$"
      rerun_command: "/test build"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_check
      skip_if_only_changed: "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      context: pull-check-dev
      trigger: "(?m)^/test (?:.*? )?check-dev(?: .*?)?$"
      rerun_command: "/test check-dev"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_check2
      skip_if_only_changed: "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      context: pull-check-dev2
      trigger: "(?m)^/test (?:.*? )?check-dev2(?: .*?)?$"
      rerun_command: "/test check-dev2"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_mysql_test
      skip_if_only_changed: "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      context: pull-mysql-test
      trigger: "(?m)^/test (?:.*? )?mysql-test(?: .*?)?$"
      rerun_command: "/test mysql-test"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_unit_test
      skip_if_only_changed: "(\\.(md|png|jpeg|jpg|gif|svg|pdf)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
      context: pull-unit-test
      trigger: "(?m)^/test (?:.*? )?unit-test(?: .*?)?$"
      rerun_command: "/test unit-test"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_unit_test_ddlv1
      run_if_changed: "pkg/(ddl|meta)/.*"
      context: pull-unit-test-ddlv1
      trigger: "(?m)^/test (?:.*? )?pull-unit-test-ddlv1(?: .*?)?$"
      rerun_command: "/test pull-unit-test-ddlv1"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_br_integration_test
      context: pull-br-integration-test
      run_if_changed: "(br|pkg/(ddl|domain|infoschema))/.*"
      trigger: "(?m)^/test (?:.*? )?pull-br-integration-test(?: .*?)?$"
      rerun_command: "/test pull-br-integration-test"

    - <<: [*jenkins_job, *brancher]
      name: pingcap-inc/tidb/release-8.5/pull_integration_e2e_test
      always_run: false
      optional: true
      context: pull-integration-e2e-test
      skip_report: false
      trigger: "(?m)^/test (?:.*? )?pull-integration-e2e-test(?: .*?)?$"
      rerun_command: "/test pull-integration-e2e-test"
