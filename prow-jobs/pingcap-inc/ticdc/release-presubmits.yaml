global_definitions:
  brancher: &brancher
    branches:
    - ^release-.*$
    - ^feature/release-8[.]5[.]5-active-active$
  changer: &changer
    skip_if_only_changed: "(\\.(md|png|jpeg|jpg|gif|svg|pdf|yaml|json)|Dockerfile|OWNERS|OWNERS_ALIASES)$"
  jenkins_job: &jenkins_job
    agent: jenkins
    decorate: false # need add this.
    max_concurrency: 2
    labels:
      master: "1"
    run_before_merge: true
  k8s_job: &k8s_job
    decorate: true
    decoration_config:
      oauth_token_secret:
        name: github-token
        key: token

# struct ref: https://pkg.go.dev/sigs.k8s.io/prow/pkg/config#Presubmit
presubmits:
  pingcap-inc/ticdc:
    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_mysql_integration_light
      context: pull-cdc-mysql-integration-light
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-mysql-integration-light)(?: .*?)?$"
      rerun_command: "/test pull-cdc-mysql-integration-light"

    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_mysql_integration_heavy
      context: pull-cdc-mysql-integration-heavy
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-mysql-integration-heavy)(?: .*?)?$"
      rerun_command: "/test pull-cdc-mysql-integration-heavy"

    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_kafka_integration_light
      context: pull-cdc-kafka-integration-light
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-kafka-integration-light)(?: .*?)?$"
      rerun_command: "/test pull-cdc-kafka-integration-light"

    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_kafka_integration_heavy
      context: pull-cdc-kafka-integration-heavy
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-kafka-integration-heavy)(?: .*?)?$"
      rerun_command: "/test pull-cdc-kafka-integration-heavy"

    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_pulsar_integration_light
      context: pull-cdc-pulsar-integration-light
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-pulsar-integration-light)(?: .*?)?$"
      rerun_command: "/test pull-cdc-pulsar-integration-light"

    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_storage_integration_light
      context: pull-cdc-storage-integration-light
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-storage-integration-light)(?: .*?)?$"
      rerun_command: "/test pull-cdc-storage-integration-light"

    - <<: [*jenkins_job, *brancher, *changer]
      name: pingcap/ticdc/pull_cdc_storage_integration_heavy
      context: pull-cdc-storage-integration-heavy
      trigger: "(?m)^/test (?:.*? )?(pull-cdc-storage-integration-heavy)(?: .*?)?$"
      rerun_command: "/test pull-cdc-storage-integration-heavy"

    - <<: [*k8s_job, *brancher, *changer]
      name: pull-unit-test
      run_before_merge: true
      spec:
        containers:
          - name: check
            image: &image ghcr.io/pingcap-qe/ci/base:v2025.12.7-3-g1c0b8cf-go1.25
            command: [bash, -ce]
            args:
              - |
                make unit_test_in_verify_ci
            resources:
              requests:
                memory: 24Gi
                cpu: "12"
              limits:
                memory: 24Gi
                cpu: "12"

    - <<: [*k8s_job, *brancher, *changer]
      name: pull-build
      run_before_merge: true
      spec:
        containers:
          - name: build
            image: *image
            command: [bash, -ce]
            args:
              - |
                make cdc
            resources: &resources
              requests:
                memory: 12Gi
                cpu: "6"
              limits:
                memory: 24Gi
                cpu: "6"

    - <<: [*k8s_job, *brancher, *changer]
      name: pull-check
      run_before_merge: true
      spec:
        containers:
          - name: check
            image: *image
            command: [bash, -ce]
            args:
              - |
                make check
            resources: *resources
    - <<: [*k8s_job, *brancher, *changer]
      name: pull-unit-test-cdc
      run_before_merge: true
      spec:
        containers:
          - name: cdc-unit-test
            image: ghcr.io/pingcap-qe/ci/base:v2026.3.8-1-g9d412f4-go1.25
            command: [bash, -ce]
            args:
              - |
                # Preserve junit artifacts for Prow even when tests fail.
                archive_junit_reports() {
                  local report
                  shopt -s globstar nullglob
                  mkdir -p "${ARTIFACTS}" || return 0
                  for report in ./**/*-junit-report.xml; do
                    cp -f "$report" "${ARTIFACTS}/$(basename "$report")" || true
                  done
                }
                trap archive_junit_reports EXIT

                make unit_test_in_verify_ci

            resources: *resources
